function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function FadeIn({ children, delay = 0, className = "" }) {
  const [ref, visible] = useInView();
  return (
    <div ref={ref} className={className} style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(24px)", transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s` }}>
      {children}
    </div>
  );
}

                { round: "Round 1", items: ["Initial hypotheses", "What we know", "What we don\u2019t", "Who researches what"] },
                { round: "Round 2+", items: ["Revise hypotheses", "New knowledge added", "New gaps found?", "Redesign plan"] },
                { round: "Final", items: ["Develop solution", "Prepare presentation"] },
              ].map((r, i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, alignItems: "flex-start" }}>
                  <div style={{ background: i === 2 ? "#10B981" : "#3B82F6", color: "#fff", fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20, whiteSpace: "nowrap", marginTop: 2 }}>{r.round}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {r.items.map((item, j) => (
                      <span key={j} style={{ fontSize: 13, color: "#4B5563", background: "#F3F4F6", padding: "4px 10px", borderRadius: 6 }}>{item}</span>
                    ))}
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid #F3F4F6" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#DC2626", marginBottom: 4 }}>{"\u26A0"} Important Notes</div>
                <div style={{ fontSize: 13, color: "#6B7280", lineHeight: 1.7 }}>The plan must be written through team discussion. Content studied individually must be taught to teammates. Studying "what we need to learn" is a whole-team task.</div>
              </div>
            </div>
          </FadeIn>
        </div>
      </section>

      {/* Section 4: Team Learning */}
      <section id="team" style={{ background: "#fff", borderTop: "1px solid #E5E7EB" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", padding: "56px 24px" }}>
          <FadeIn><SectionTitle sub="Team learning is the engine of PBL, but it's not the same as dividing tasks.">Team Learning Mindset & Tips</SectionTitle></FadeIn>

          <FadeIn>
            <div style={{ background: "#FEF2F2", borderRadius: 12, padding: 24, marginBottom: 32, borderLeft: "4px solid #EF4444" }}>
              <div style={{ fontSize: 16, fontWeight: 600, color: "#991B1B", marginBottom: 8 }}>Team Learning &ne; Task Division</div>
              <p style={{ fontSize: 14, color: "#7F1D1D", lineHeight: 1.7, fontStyle: "italic" }}>"You do Part 1, I'll do Part 2, let's just combine them" &mdash; This is NOT PBL teamwork!</p>
              <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.7, marginTop: 8 }}>All team members must participate in <strong>every stage</strong> and discuss together.</p>
            </div>
          </FadeIn>

          <FadeIn delay={0.1}>
            <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 32 }}>
              <div style={{ background: "#FEF2F2", borderRadius: 12, padding: 20, border: "1px solid #FECACA" }}>
                <div style={{ fontWeight: 700, color: "#DC2626", marginBottom: 12, fontSize: 15 }}>{"\u274C"} Group</div>
                <div style={{ fontSize: 14, color: "#7F1D1D", lineHeight: 1.8 }}>Collection of individual tasks<br />Only individual responsibility<br />Simple gathering</div>
              </div>
              <div style={{ background: "#EFF6FF", borderRadius: 12, padding: 20, border: "1px solid #BFDBFE" }}>
                <div style={{ fontWeight: 700, color: "#1D4ED8", marginBottom: 12, fontSize: 15 }}>{"\u2705"} Team</div>
                <div style={{ fontSize: 14, color: "#1E3A8A", lineHeight: 1.8 }}>Shared tasks performed together<br />Individual + shared responsibility<br />Requires <strong>Trust</strong> & <strong>Commitment</strong></div>
              </div>
            </div>
          </FadeIn>

          <FadeIn delay={0.15}>
            <div style={{ background: "#F0FDF4", borderRadius: 12, padding: 24, marginBottom: 32, borderLeft: "4px solid #10B981" }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, color: "#065F46", marginBottom: 12 }}>The Instructor's Role: Facilitator</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {["Provides feedback during team discussions", "Guides discussions toward problem-solving", "Asks probing questions to grasp the problem\u2019s essence", "Delivers mini-lectures for wrap-up & synthesis"].map((t, i) => (
                  <div key={i} style={{ fontSize: 14, color: "#374151", display: "flex", gap: 8 }}><span style={{ color: "#10B981" }}>&rarr;</span> {t}</div>
                ))}
              </div>
            </div>
          </FadeIn>

          <FadeIn delay={0.2}>
            <h3 style={{ fontSize: 16, fontWeight: 600, color: "#374151", marginBottom: 12 }}>Behaviors That Hinder Team Learning</h3>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 32 }}>
              {hindrances.map((h, i) => (
                <span key={i} style={{ background: "#FEF2F2", color: "#991B1B", fontSize: 13, padding: "6px 12px", borderRadius: 20, border: "1px solid #FECACA" }}>{h}</span>
              ))}
            </div>
          </FadeIn>

          <FadeIn delay={0.25}><h3 style={{ fontSize: 18, fontWeight: 600, color: "#374151", marginBottom: 16 }}>Practical Tips</h3></FadeIn>

          <FadeIn delay={0.3}>
            <div style={{ background: "#F8FAFC", borderRadius: 12, padding: 20, marginBottom: 16, border: "1px solid #E5E7EB" }}>
              <div style={{ fontWeight: 600, color: "#1E40AF", marginBottom: 8 }}>{"\u{1F4AA}"} Tip 1: Build Your Team Well</div>
              <div style={{ fontSize: 14, color: "#4B5563", lineHeight: 1.7 }}>Introduce yourself and build rapport. Create a team name. Establish Ground Rules together.</div>
            </div>
          </FadeIn>

          <FadeIn delay={0.35}>
            <div style={{ background: "#F8FAFC", borderRadius: 12, padding: 20, marginBottom: 16, border: "1px solid #E5E7EB" }}>
              <div style={{ fontWeight: 600, color: "#1E40AF", marginBottom: 8 }}>{"\u{1F4CB}"} Tip 2: Ground Rules</div>
              <div style={{ fontSize: 14, color: "#4B5563", marginBottom: 8 }}>Rules your team creates and commits to following:</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {groundRules.map((r, i) => (
                  <span key={i} style={{ background: "#EFF6FF", color: "#1E40AF", fontSize: 12, padding: "4px 10px", borderRadius: 6 }}>{r}</span>
                ))}
              </div>
            </div>
          </FadeIn>

          <FadeIn delay={0.4}>
            <div style={{ background: "#F8FAFC", borderRadius: 12, padding: 20, border: "1px solid #E5E7EB" }}>
              <div style={{ fontWeight: 600, color: "#1E40AF", marginBottom: 8 }}>{"\u23F1"} Tip 3: Discussion Matrix</div>
              <div style={{ fontSize: 14, color: "#4B5563", lineHeight: 1.7 }}>Break topics into sub-agendas. Allocate time per agenda. Post results on sticky notes. End with summary & reflection.</div>
            </div>
          </FadeIn>
        </div>
      </section>

      {/* Section 5: Benefits */}
      <section id="benefits" style={{ background: "#FAFBFC", borderTop: "1px solid #E5E7EB" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", padding: "56px 24px" }}>
          <FadeIn><SectionTitle sub="Research-proven effects of Problem-Based Learning.">Benefits of PBL</SectionTitle></FadeIn>
          <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 40 }}>
            {benefitsData.map((b, i) => (
              <FadeIn key={i} delay={i * 0.1}>
                <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 12, padding: 24, height: "100%" }}>
                  <div style={{ fontSize: 32, marginBottom: 12 }}>{b.icon}</div>
                  <div style={{ fontWeight: 600, fontSize: 16, color: "#111827", marginBottom: 8 }}>{b.title}</div>
                  <div style={{ fontSize: 14, color: "#6B7280", lineHeight: 1.7 }}>{b.desc}</div>
                </div>
              </FadeIn>
            ))}
          </div>
          <FadeIn>
            <h3 style={{ fontSize: 18, fontWeight: 600, color: "#374151", marginBottom: 16 }}>Competencies Developed</h3>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
              {competencies.map((c, i) => (
                <div key={i} style={{ flex: 1, minWidth: 180, background: "#fff", borderRadius: 12, padding: 20, border: "1px solid #E5E7EB" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: c.color, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>{c.type}</div>
                  {c.items.map((item, j) => (
                    <div key={j} style={{ fontSize: 14, color: "#374151", padding: "2px 0" }}>{item}</div>
                  ))}
                </div>
              ))}
            </div>
          </FadeIn>
        </div>
      </section>

      {/* Section 6: Links */}
      <section id="links" style={{ background: "linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%)", borderTop: "1px solid #E5E7EB" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", padding: "56px 24px", textAlign: "center" }}>
          <FadeIn>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#93C5FD", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 12 }}>Next Steps</div>
            <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 32, fontWeight: 700, color: "#fff", marginBottom: 12, letterSpacing: "-0.02em" }}>Quiz & Survey</h2>
            <p style={{ fontSize: 16, color: "#BFDBFE", marginBottom: 40, maxWidth: 480, margin: "0 auto 40px" }}>Test your understanding of PBL and share your feedback.</p>
          </FadeIn>
          <FadeIn delay={0.1}>
            <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, maxWidth: 480, margin: "0 auto" }}>
              <a href={"https://forms.gle/tcXfn5NjeAExAHwg9"} target="_blank" rel="noopener noreferrer"
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, background: "rgba(255,255,255,0.12)", borderRadius: 16, padding: "32px 24px", textDecoration: "none", border: "1px solid rgba(255,255,255,0.2)", transition: "all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.2)"}
                onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.12)"}>
                <span style={{ fontSize: 36 }}>{"\u{1F4DD}"}</span>
                <span style={{ fontSize: 16, fontWeight: 600, color: "#fff" }}>Take the Quiz</span>
                <span style={{ fontSize: 13, color: "#93C5FD" }}>Google Form &rarr;</span>
              </a>
              <a href={SURVEY_URL} target="_blank" rel="noopener noreferrer"
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, background: "rgba(255,255,255,0.12)", borderRadius: 16, padding: "32px 24px", textDecoration: "none", border: "1px solid rgba(255,255,255,0.2)", transition: "all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.2)"}
                onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.12)"}>
                <span style={{ fontSize: 36 }}>{"\u{1F4CA}"}</span>
                <span style={{ fontSize: 16, fontWeight: 600, color: "#fff" }}>Take the Survey</span>
                <span style={{ fontSize: 13, color: "#93C5FD" }}>Google Form &rarr;</span>
              </a>
            </div>
          </FadeIn>
        </div>
      </section>

      <footer style={{ background: "#111827", padding: "32px 24px", textAlign: "center" }}>
        <p style={{ fontSize: 13, color: "#6B7280", lineHeight: 1.7 }}>Korea University Sejong Campus</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
