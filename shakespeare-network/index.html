<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shakespeare Character Networks</title>
    <link rel="stylesheet" href="./styles.css?v=20260514-1258">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Shakespeare Character Networks</p>
          <h1 id="playTitle">Loading corpus</h1>
        </div>
        <div class="top-actions">
          <label class="control-label" for="playSelect">Play</label>
          <select id="playSelect" class="select"></select>
        </div>
      </header>

      <section class="workspace" aria-label="Network analysis workspace">
        <aside class="side-panel left-panel">
          <section class="panel-section">
            <div class="section-heading">
              <h2>Network</h2>
              <span id="playMeta" class="meta-pill">-</span>
            </div>

            <label class="control-label">Edge Type</label>
            <div class="segmented" role="group" aria-label="Edge type">
              <button class="segment-button active" type="button" data-edge-type="co_present">Stage</button>
              <button class="segment-button" type="button" data-edge-type="co_speaking">Speech</button>
            </div>

            <label class="control-label" for="modeSelect">Mode</label>
            <select id="modeSelect" class="select">
              <option value="full" selected>Full play</option>
              <option value="cumulative_scene">Cumulative scene</option>
              <option value="scene">Scene</option>
              <option value="act">Act</option>
              <option value="cumulative_act">Cumulative act</option>
              <option value="sliding_window_3">Sliding window 3</option>
              <option value="sliding_window_5">Sliding window 5</option>
            </select>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>Timeline</h2>
              <span id="timeLabel" class="meta-pill">-</span>
            </div>
            <div class="transport-row">
              <button id="prevButton" class="icon-button" type="button" title="Previous" aria-label="Previous">&#9664;</button>
              <button id="playButton" class="icon-button" type="button" title="Play" aria-label="Play">&#9654;</button>
              <button id="nextButton" class="icon-button" type="button" title="Next" aria-label="Next">&#9654;&#9654;</button>
            </div>
            <input id="timeSlider" class="range" type="range" min="0" max="0" value="0">
          </section>

          <section class="panel-section">
            <h2>Encoding</h2>
            <label class="control-label" for="nodeSizeSelect">Node Size</label>
            <select id="nodeSizeSelect" class="select">
              <option value="degree" selected>Degree</option>
              <option value="weighted_degree">Weighted degree</option>
              <option value="pagerank">PageRank</option>
              <option value="betweenness">Betweenness</option>
              <option value="closeness">Closeness</option>
              <option value="eigenvector">Eigenvector</option>
              <option value="uniform">Uniform</option>
            </select>

            <label class="control-label" for="colorBySelect">Node Color</label>
            <select id="colorBySelect" class="select">
              <option value="community" selected>Community</option>
              <option value="sex">Gender</option>
              <option value="metric">Node metric</option>
            </select>

            <label class="control-label" for="edgeWidthSelect">Edge Width</label>
            <select id="edgeWidthSelect" class="select">
              <option value="weight" selected>Weight</option>
              <option value="uniform">Uniform</option>
              <option value="degree">Endpoint degree</option>
              <option value="weighted_degree">Endpoint weighted degree</option>
              <option value="betweenness">Endpoint betweenness</option>
            </select>

            <label class="control-label" for="edgeWeightRange">Minimum Edge Weight</label>
            <div class="inline-value">
              <input id="edgeWeightRange" class="range" type="range" min="1" max="1" value="1">
              <span id="edgeWeightValue">1</span>
            </div>

            <label class="toggle-row">
              <input id="labelToggle" type="checkbox" checked>
              <span>Labels</span>
            </label>

            <label class="toggle-row">
              <input id="groupToggle" type="checkbox">
              <span>Group characters</span>
            </label>

            <div class="filter-actions">
              <button id="resetFiltersButton" type="button" class="command-button">Reset filters</button>
            </div>
          </section>

          <section class="panel-section">
            <h2>Character</h2>
            <label class="control-label" for="characterSelect">Focus</label>
            <select id="characterSelect" class="select"></select>
          </section>
        </aside>

        <section class="canvas-panel">
          <div class="canvas-toolbar">
            <span id="canvasStatus">Preparing network</span>
            <div class="canvas-tools">
              <button id="resetViewButton" class="mini-icon-button" type="button" title="Reset view" aria-label="Reset view">&#8634;</button>
              <span id="snapshotMeta">-</span>
            </div>
          </div>
          <canvas id="networkCanvas" aria-label="Character network canvas"></canvas>
        </section>

        <aside class="side-panel right-panel">
          <section class="panel-section">
            <h2>Metrics</h2>
            <dl class="metric-grid">
              <div><dt>Nodes</dt><dd id="metricNodes">-</dd></div>
              <div><dt>Edges</dt><dd id="metricEdges">-</dd></div>
              <div><dt>Density</dt><dd id="metricDensity">-</dd></div>
              <div><dt>Q</dt><dd id="metricModularity">-</dd></div>
              <div><dt>Communities</dt><dd id="metricCommunities">-</dd></div>
              <div><dt>Avg Weight</dt><dd id="metricAvgWeight">-</dd></div>
            </dl>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>Top Nodes</h2>
              <span id="topMetricLabel" class="meta-pill">Degree</span>
            </div>
            <ol id="topNodesList" class="rank-list"></ol>
          </section>

          <section class="panel-section">
            <h2>Focus</h2>
            <div id="focusPanel" class="focus-panel">
              <p class="muted">Select a character.</p>
            </div>
          </section>

          <section class="panel-section">
            <h2>Export</h2>
            <div class="export-grid">
              <button id="exportJsonButton" type="button" class="command-button">JSON</button>
              <button id="exportCsvButton" type="button" class="command-button">CSV</button>
              <button id="exportPngButton" type="button" class="command-button">PNG</button>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js?v=20260514-1258"></script>
  </body>
</html>
